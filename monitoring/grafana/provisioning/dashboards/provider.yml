# Grafana 대시보드 프로비저닝 — 파일 프로바이더로 dashboard.json을 자동 로드.
apiVersion: 1

providers:
  - name: pay-dashboards
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
