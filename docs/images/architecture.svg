  <rect x="40" y="656" width="1120" height="120" rx="10" fill="#eef6fb" stroke="#4a8db8" stroke-width="1"/>
  <text x="600" y="682" text-anchor="middle" font-size="12" font-weight="700" fill="#1e5f8a">설계 원칙 셋</text>
  <text x="600" y="706" text-anchor="middle" font-size="10.5" fill="#334155">금액·가격·신원은 서버가 정한다 — 클라이언트 값은 대조용, 신뢰 경계가 검증보다 먼저</text>
  <text x="600" y="728" text-anchor="middle" font-size="10.5" fill="#334155">실패를 지운 셈 치지 않는다 — 타임아웃은 UNKNOWN으로 보존, 복구 배치가 PG 조회로 확정</text>
  <text x="600" y="750" text-anchor="middle" font-size="10.5" fill="#334155">돈이 맞는지 수학으로 증명한다 — 복식부기 원장(차변=대변)과 대사가 최종 방어선</text>

