  <rect width="1200" height="820" rx="12" fill="#f8fafb"/>

  <!-- Title -->
  <text x="600" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#1e293b" letter-spacing="-0.02em">pay — Spring Modulith 결제 시스템 아키텍처</text>
  <text x="600" y="53" text-anchor="middle" font-size="11" fill="#94a3b8">모듈형 모놀리스 · 17 모듈 · 모듈 간 통신은 도메인 이벤트(Outbox) · 경계는 ModularityTests가 CI에서 강제</text>

