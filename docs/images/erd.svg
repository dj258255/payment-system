  <rect width="1200" height="880" rx="12" fill="#f8fafb"/>

  <text x="600" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#1e293b" letter-spacing="-0.02em">pay ERD — 핵심 테이블과 관계</text>
  <text x="600" y="53" text-anchor="middle" font-size="11" fill="#94a3b8">MySQL 8.4 · Flyway V1~V18 · 33 테이블 중 자금 흐름 핵심만 표기 · 금액은 KRW 정수(BIGINT)</text>

  <!-- ═══ 주문 그룹 ═══ -->
