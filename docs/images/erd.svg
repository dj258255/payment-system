  <text x="110" y="281" text-anchor="middle" font-size="8.5" fill="#64748b">unit_price</text>

  <rect x="184" y="230" width="116" height="60" rx="8" fill="#fff" stroke="#27ae60" stroke-width="1.2" filter="url(#sh)"/>
