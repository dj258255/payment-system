spring:
  application:
    name: pay

  # PG 정산 파일 업로드 대사용. 정산 CSV는 수만 행이어도 수 MB 수준 → 여유 있게 잡되 무제한은 아님.
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  datasource:
    url: jdbc:mysql://localhost:3306/pay?serverTimezone=UTC&characterEncoding=UTF-8
    username: pay
    password: pay
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 폭주 시 매달리지 않고 빠르게 실패 — 지연이 마비로 번지는 걸 차단.
    # connection-timeout 기본 30초는 폭주 시 요청 스레드가 커넥션을 기다리며 줄줄이 매달려
    # 전면 마비로 번진다. 3초 안에 못 얻으면 에러로 빠르게 떨궈 스레드를 즉시 회수한다.
    hikari:
      maximum-pool-size: 20
      connection-timeout: 3000     # 폭주 시 30초 대기 대신 3초 빠른 실패
      validation-timeout: 2000

  jpa:
    hibernate:
      ddl-auto: validate        # 스키마는 마이그레이션으로 관리, JPA는 검증만 (원장 append-only 보호)
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false          # OSIV 비활성화 — 긴 트랜잭션/커넥션 점유 방지 (카카오페이 성능 개선 교훈)

  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false          # Redis는 캐시·분산락 용도만 — JPA 리포지토리를 Redis가 넘보는 store-detection 경고 제거

  # 스키마는 Flyway가 관리한다 (원장 append-only 보호를 위해 JPA는 validate만)
  flyway:
    enabled: true
    baseline-on-migrate: true

  # Kafka 외부화용. 기본은 빈 값 → 브로커 없이도 앱이 뜬다. 운영/데모는 KAFKA_BOOTSTRAP로 주입.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:}

  # Spring Modulith Event Publication Registry (= Transactional Outbox) 를 JPA로 영속화
  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: false         # event_publication은 Flyway(V1)가 생성한다
      republish-outstanding-events-on-restart: true   # 미완료 이벤트 재시도
      externalization:
        # 기본 off. 브로커가 없으면 @Externalized 이벤트를 Kafka로 내보내지 않는다
        # → 브로커 없이 부팅/테스트가 깨지지 않고, Outbox 기반 인프로세스 소비는 그대로 동작한다.
        # 운영/데모에서 kafka 프로파일로 켠다(아래 --- kafka 문서 참고).
        enabled: false

  # 우아한 종료(graceful shutdown) — SIGTERM을 받으면 새 요청은 받지 않고(수용 중단),
  # 진행 중인 결제 요청은 완료까지 드레이닝한 뒤 종료한다(배포 시 인플라이트 결제 강제 중단 방지).
  # 드레이닝이 아래 timeout-per-shutdown-phase(20초)를 넘기면 남은 요청을 끊고 강제 종료한다.
  lifecycle:
    timeout-per-shutdown-phase: 20s

# 폭주 시 스레드 무한 증식 대신 상한 — 초과 유입은 컨테이너 수용 큐에서 대기·거절되어
# 힙/컨텍스트 스위칭 폭발로 번지지 않는다(기본 200 → 100, DB 풀 20과 균형).
server:
  # SIGTERM 시 새 요청은 안 받고 진행 중 결제는 완료까지 드레이닝(위 timeout 안에서). 최대 대기 후 강제 종료.
  # (k8s면 LB 디레지스터 경합을 없애려 preStop sleep 지연도 필요하나, 단일 프로세스라 여기선 설정만 둔다.)
  shutdown: graceful
  tomcat:
    threads:
      max: 100

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, modulith, prometheus
  metrics:
    tags:
      application: pay

logging:
  level:
    org.springframework.modulith: INFO

# 애플리케이션 시크릿 — 운영에서는 반드시 환경변수/시크릿 매니저로 주입한다.
# 아래 값은 로컬 개발 전용 기본값(env가 우선). 코드에는 키를 두지 않는다.
app:
  crypto:
    key: ${APP_CRYPTO_KEY:devlocalkey_0123456789abcdef0123}   # (단일 키·AesGcmFieldCipher용) AES-256=32바이트, 운영은 KMS/env
    # 필드 암호화 방식: envelope(기본, DEK/KEK) | simple(단일 키 AesGcm).
    # envelope은 데이터를 매번 새 DEK로 암호화하고 그 DEK를 KEK(마스터키)로 감싸(wrap) 함께 저장한다.
    # → 키 로테이션 시 데이터 전체 재암호화 없이 작은 DEK만 새 KEK로 재-wrap한다(EnvelopeFieldCipher.rewrapToCurrent).
    # 운영에서는 아래 kek를 실 KMS(AWS KMS/Vault)로 옮겨 keyFor 구현만 교체한다(마스터키를 프로세스 밖에 보관).
    # 주의: envelope 암호문은 wrap된 DEK를 함께 실어 단일 키보다 길다 → 민감 컬럼 길이를 넉넉히 잡을 것.
    mode: ${APP_CRYPTO_MODE:envelope}
    kek:
      current: ${APP_KEK_CURRENT:v1}                          # 현재 wrap에 쓸 KEK 버전
      v1: ${APP_KEK_V1:kek-v1-local-0000000000000000000}      # 필수, AES-256=32바이트. 운영은 env/KMS
      v2: ${APP_KEK_V2:}                                       # 옵션(로테이션 데모). 있으면 등록, current를 v2로 올릴 수 있다
    # 블라인드 인덱스(HMAC-SHA256) secret — 암호화된 빌링키의 동등 조회·유니크를 대체한다.
    # 같은 빌링키는 항상 같은 인덱스가 되어 findByBillingKeyIndex로 찾는다. 16바이트 이상(BlindIndexer fail-fast).
    # 운영은 반드시 env/시크릿 매니저로 주입한다(아래는 로컬 개발 전용 기본값).
    blind-index-secret: ${APP_BLIND_INDEX_SECRET:blind-index-local-secret-0000000000}
  jwt:
    # HS256 대칭 서명 키. 로컬/테스트 편의로 32바이트 이상 기본값을 두되, 운영은 env로 오버라이드.
    # 런타임에 길이(<32바이트)를 검증해 약한 키로 뜨는 것을 막는다(JwtConfig fail-fast).
    secret: ${APP_JWT_SECRET:local-dev-only-please-override-with-32byte-min-secret-key}
    # access: 짧게(서명·폐기 검증만) / refresh: 길게(Redis에만 존재, 회전·폐기 가능).
    # 짧은 access + 긴 refresh로 재로그인 없이 세션을 연장하고, 폐기는 Redis denylist로 처리한다.
    access-expiry-minutes: ${APP_JWT_ACCESS_MIN:30}
    refresh-expiry-days: ${APP_JWT_REFRESH_DAYS:14}
  admin:
    password: ${APP_ADMIN_PASSWORD:admin-local-only}
  user:
    password: ${APP_USER_PASSWORD:user-local-only}
  # 이상거래탐지(FDS) 설정.
  fds:
    velocity:
      # velocity 카운터를 공유 Redis로 셀지 여부. 기본 true(RedisVelocityCounter @Primary) — 다중
      # 인스턴스에서 카운트가 정확하다. false면 InMemoryVelocityCounter로 폴백(단일 인스턴스·테스트용).
      redis: ${APP_FDS_VELOCITY_REDIS:true}
  # 보상(망취소) 재시도 스케줄러 — 기본 off(테스트/부트 부작용 방지). 운영에서 env로 켠다.
  compensation:
    enabled: ${APP_COMPENSATION_ENABLED:false}
    interval-ms: 5000

  # 아래 배치들은 로직만 있고 주기 호출자가 없던 것들 — 스케줄러를 붙여 주기 실행하고, outbox
  # 완료 이벤트도 주기 정리한다. 모두 기본 off(@ConditionalOnProperty 게이트로 테스트/부트 무영향).
  # 운영에서 env로 켠다(각 스케줄러는 짝이 되는 @EnableScheduling 게이트도 같은 프로퍼티로 함께 켜진다).

  # 미확정(UNKNOWN) 결제 복구 스케줄러 → PaymentRecoveryService.recoverUnknownPayments()
  recovery:
    enabled: ${APP_RECOVERY_ENABLED:false}
    interval-ms: 60000
  # 가상계좌 만료 배치 스케줄러 → VirtualAccountService.expireOverdue(now)
  va:
    expiry:
      enabled: ${APP_VA_EXPIRY_ENABLED:false}
      interval-ms: 60000
  # 구독 정기결제(dunning) 스케줄러 → SubscriptionService.runBillingCycle(today). 청구 주기라 기본 1시간.
  dunning:
    enabled: ${APP_DUNNING_ENABLED:false}
    interval-ms: 3600000
  # 주문 만료 배치 스케줄러 → OrderExpiryService.expireOverdue(now) (PENDING_PAYMENT+만료시각 경과 → EXPIRED)
  order:
    expiry:
      enabled: ${APP_ORDER_EXPIRY_ENABLED:false}
      interval-ms: 60000
  # Modulith Outbox(event_publication) 완료 이벤트 정리 스케줄러 → 무한 성장 방지. 기본 1시간 주기, 7일 보존.
  outbox:
    cleanup:
      enabled: ${APP_OUTBOX_CLEANUP_ENABLED:false}
      interval-ms: 3600000
      retention-days: ${APP_OUTBOX_RETENTION_DAYS:7}
  # API 유입 제어(rate limit) — "감당 못 할 요청은 바깥 층에서 싸게 거절한다(429)".
  # 대상: POST /api/v1/orders, POST /api/v1/payments/confirm (RateLimitFilter, 시큐리티 체인 내
  # Bearer 인증 뒤). 고정 윈도우(1초) INCR — 경계 순간 최대 2배 통과는 단순성의 대가로 수용.
  ratelimit:
    enabled: ${APP_RATELIMIT_ENABLED:true}       # k6 전/후 비교용 스위치 — false면 필터가 전부 통과
    per-user-per-sec: ${APP_RATELIMIT_PER_USER:5}   # 사용자당 초당 허용(스크립트·이중클릭 억제)
    global-per-sec: ${APP_RATELIMIT_GLOBAL:100}     # 경로당 전체 초당 허용(DB로 가는 총량 캡)

  # 선착순 대기열(Redis ZSET) — 순간 트래픽 폭증 시 DB 유입을 제어한다.
  queue:
    # 앞에서부터 이 인원(rank < admit-limit)만 "입장"시켜 결제로 보낸다 — DB 유입 제어의 상한.
    admit-limit: ${APP_QUEUE_ADMIT_LIMIT:100}
    # 입장권(admit:{eventId}:{userId}) TTL — admitted 판정 순간 발급되고, 이 시간 안에 주문까지
    # 마쳐야 한다. 만료되면 다시 status 폴링으로 재발급받으면 된다(줄에 있으면 즉시).
    pass-ttl-seconds: ${APP_QUEUE_PASS_TTL:600}
    # 대기열 게이트(옵트인): 아래 상품이 주문에 포함되면 서버가 입장권을 강제한다(권고→강제).
    # 기본 빈 목록 = 게이트 비활성 — 기존 주문 경로 100% 불변, 대상 없으면 무비용.
    gate:
      event-id: ${APP_QUEUE_GATE_EVENT:drop}       # 입장권을 검사할 이벤트 ID
      product-ids: ${APP_QUEUE_GATE_PRODUCTS:}     # 쉼표 구분 productId 목록(예: "1,2")
  # 에스크로(자금 보류) — 결제금을 구매확정 전까지 HELD로 잡아둔다.
  escrow:
    # 자동 구매확정까지의 보류 기간(일). 이 기간 무응답이면 자동 릴리스 대상이 된다.
    hold-period-days: ${APP_ESCROW_HOLD_DAYS:7}
    # 자동 릴리스 스케줄러 — 기본 off(테스트/부트 부작용 방지). 운영에서 env로 켠다.
    auto-release:
      enabled: ${APP_ESCROW_AUTO_RELEASE_ENABLED:false}
      interval-ms: 60000

# 웹훅 서명 검증(HMAC-SHA256) 시크릿. 아래는 로컬 개발 전용 기본값(16바이트 이상)이고, 운영은
# 반드시 env/시크릿 매니저로 오버라이드한다. 미설정/약한 키면 기동을 실패시킨다(WebhookSignatureVerifier fail-fast).
payment:
  webhook:
    secret: ${PAYMENT_WEBHOOK_SECRET:local-webhook-secret-please-override-32b}

---
# kafka 프로파일: 브로커가 있을 때만 활성화한다(예: SPRING_PROFILES_ACTIVE=kafka).
# 외부화를 켜고, 유실 방지(acks=all)·중복 억제(멱등 producer)를 갖춘 producer를 구성한다.
# 이 문서를 활성화하지 않으면(기본) 위의 externalization.enabled=false가 유지되어 브로커 없이도 뜬다.
spring:
  config:
    activate:
      on-profile: kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Modulith 외부화는 이벤트를 이미 JSON byte[]로 직렬화해 넘긴다. JsonSerializer를 쓰면
      # 그 byte[]가 다시 JSON(base64 문자열)으로 감싸져 이중 인코딩된다(소비자 실검증에서 발견).
      # ByteArraySerializer로 그대로 실어야 와이어에 깨끗한 JSON이 나간다.
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
      acks: all                    # 유실 방지 — 모든 in-sync 복제본이 받아야 성공
      properties:
        enable.idempotence: true   # 멱등 producer — 재시도로 인한 중복 발행 억제
  modulith:
    events:
      externalization:
        enabled: true              # @Externalized 이벤트를 Kafka로 발행(Outbox가 유실 방지, at-least-once)
