name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 같은 브랜치에서 새 푸시가 오면 진행 중인 실행을 취소해 러너 시간을 아낀다.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # 전체 테스트 = 단위·슬라이스 + Spring Modulith 경계 검증(ModularityTests).
      # Testcontainers/실 DB 없이 결정적으로 도는 스위트라 러너에 Docker가 필요 없다.
      - name: Run tests
        run: ./gradlew clean test --console=plain

      # consumer-app은 별도 Gradle 프로젝트(독립 빌드)라 위 test에 포함되지 않는다.
      # Kafka 소비자가 깨진 채 머지되지 않도록 CI에서 함께 빌드·검증한다.
      - name: Build consumer-app (독립 프로젝트)
        run: ./gradlew -p consumer-app build --console=plain

      # 실패해도 리포트는 남겨 원인 파악을 돕는다.
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test
          if-no-files-found: ignore
          retention-days: 7

  # 실 MySQL(Testcontainers) 위에서 승인/취소가 DB에 확정되는지 검증하는 통합 테스트.
  # 로컬에선 컨테이너 부팅이 무겁고 hang 이력이 있어 기본 스위트에서 제외하고, Docker가 있는 CI에서만 돈다.
  integration-test:
    name: integration test (real DB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run integration tests (Testcontainers)
        run: ./gradlew integrationTest --console=plain

      - name: Upload integration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report
          path: build/reports/tests/integrationTest
          if-no-files-found: ignore
          retention-days: 7
