name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 같은 브랜치에서 새 푸시가 오면 진행 중인 실행을 취소해 러너 시간을 아낀다.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # 전체 테스트 = 단위·슬라이스 + Spring Modulith 경계 검증(ModularityTests).
      # Testcontainers/실 DB 없이 결정적으로 도는 스위트라 러너에 Docker가 필요 없다.
      - name: Run tests
        run: ./gradlew clean test --console=plain

      # 실패해도 리포트는 남겨 원인 파악을 돕는다.
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test
          if-no-files-found: ignore
          retention-days: 7
