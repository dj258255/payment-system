services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: pay
      MYSQL_USER: pay
      MYSQL_PASSWORD: pay
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 결제 이벤트 외부화용 Kafka(KRaft 단일 브로커 — ZooKeeper 없음).
  # kafka 프로파일로 앱을 띄우고 KAFKA_BOOTSTRAP=localhost:9092 로 연결한다.
  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # 외부화 producer가 payment.confirmed / payment.canceled 첫 발행 시 토픽을 자동 생성한다
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 관측성 스택 — monitoring 프로필로만 기동한다(기본 up에는 포함되지 않음).
  #   docker compose --profile monitoring up -d prometheus grafana
  # 앱은 호스트 8080에서 bootRun으로 띄우고, prometheus가 host.docker.internal:8080을 스크레이프한다.
  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["monitoring"]
    ports:
      # 로컬 전용 바인딩 — 메트릭이 LAN에 노출되지 않게 127.0.0.1로 묶는다.
      - "127.0.0.1:9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    extra_hosts:
      # 리눅스 호환 — host.docker.internal이 호스트를 가리키게 한다.
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["monitoring"]
    ports:
      # 로컬 전용 바인딩 — 대시보드를 LAN에 노출하지 않는다.
      - "127.0.0.1:3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      # 최소권한 — 데모는 대시보드를 보기만 하면 되므로 Viewer.
      # Admin이면 익명 사용자가 데이터소스를 추가해 내부 서비스로 SSRF 피벗이 가능해진다.
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/dashboard.json:/var/lib/grafana/dashboards/dashboard.json:ro
    depends_on:
      - prometheus
